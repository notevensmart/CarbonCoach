<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">CarbonCoach current architecture</title>
  <desc id="desc">System diagram showing the React client, FastAPI API layer, structured estimate pipeline, data sources, external services, and response contract.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78716c"/>
    </marker>
    <style>
      .bg { fill: #f8faf7; }
      .title { fill: #0f172a; font: 800 42px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 19px Arial, sans-serif; }
      .section-title { fill: #0f172a; font: 800 22px Arial, sans-serif; }
      .label { fill: #0f172a; font: 700 17px Arial, sans-serif; }
      .small { fill: #475569; font: 400 14px Arial, sans-serif; }
      .tiny { fill: #64748b; font: 400 12px Arial, sans-serif; }
      .mono { fill: #334155; font: 700 13px "Courier New", monospace; }
      .panel { fill: #ffffff; stroke: #d6d3d1; stroke-width: 2; }
      .panel-green { fill: #ecfdf5; stroke: #99f6e4; stroke-width: 2; }
      .panel-blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 2; }
      .panel-amber { fill: #fffbeb; stroke: #fde68a; stroke-width: 2; }
      .panel-red { fill: #fef2f2; stroke: #fecaca; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #d6d3d1; stroke-width: 2; }
      .box-green { fill: #f0fdfa; stroke: #5eead4; stroke-width: 2; }
      .box-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .box-amber { fill: #fffbeb; stroke: #fbbf24; stroke-width: 2; }
      .box-red { fill: #fff1f2; stroke: #fda4af; stroke-width: 2; }
      .arrow { fill: none; stroke: #0f766e; stroke-width: 3; marker-end: url(#arrow); }
      .arrow-muted { fill: none; stroke: #78716c; stroke-width: 2.5; stroke-dasharray: 8 8; marker-end: url(#arrow-muted); }
      .divider { stroke: #e7e5e4; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1180"/>

  <text x="70" y="78" class="title">CarbonCoach current architecture</text>
  <text x="70" y="114" class="subtitle">Natural-language journal entry to transparent carbon estimate, with uncertainty visible in the product UI.</text>

  <rect x="60" y="155" width="360" height="300" rx="26" class="panel-green"/>
  <text x="92" y="198" class="section-title">Client experience</text>
  <rect x="92" y="225" width="296" height="58" rx="16" class="box-green"/>
  <text x="120" y="250" class="label">React + Tailwind UI</text>
  <text x="120" y="273" class="small">single-session product surface</text>
  <rect x="92" y="302" width="296" height="58" rx="16" class="box"/>
  <text x="120" y="327" class="label">Journal input</text>
  <text x="120" y="350" class="small">natural language + demo chips</text>
  <rect x="92" y="379" width="296" height="58" rx="16" class="box"/>
  <text x="120" y="404" class="label">Result dashboard</text>
  <text x="120" y="427" class="small">Overview / Activities / Details</text>

  <rect x="505" y="155" width="360" height="300" rx="26" class="panel-blue"/>
  <text x="537" y="198" class="section-title">API and serving layer</text>
  <rect x="537" y="225" width="296" height="58" rx="16" class="box-blue"/>
  <text x="565" y="250" class="label">FastAPI application</text>
  <text x="565" y="273" class="small">routes, CORS, JSON responses</text>
  <rect x="537" y="302" width="296" height="58" rx="16" class="box"/>
  <text x="565" y="327" class="label">Estimate route</text>
  <text x="565" y="350" class="mono">POST /api/estimate-v2</text>
  <rect x="537" y="379" width="296" height="58" rx="16" class="box"/>
  <text x="565" y="404" class="label">Production app shell</text>
  <text x="565" y="427" class="small">serves built React assets at /</text>

  <rect x="950" y="155" width="360" height="300" rx="26" class="panel-amber"/>
  <text x="982" y="198" class="section-title">Warmup and metadata</text>
  <rect x="982" y="225" width="296" height="58" rx="16" class="box-amber"/>
  <text x="1010" y="250" class="label">Startup preload</text>
  <text x="1010" y="273" class="small">downloads activity lookup files</text>
  <rect x="982" y="302" width="296" height="58" rx="16" class="box"/>
  <text x="1010" y="327" class="label">Local factor metadata</text>
  <text x="1010" y="350" class="small">enriched records + taxonomy</text>
  <rect x="982" y="379" width="296" height="58" rx="16" class="box"/>
  <text x="1010" y="404" class="label">Health check</text>
  <text x="1010" y="427" class="mono">GET /healthz</text>

  <rect x="1395" y="155" width="345" height="300" rx="26" class="panel"/>
  <text x="1427" y="198" class="section-title">External systems</text>
  <rect x="1427" y="225" width="281" height="58" rx="16" class="box"/>
  <text x="1455" y="250" class="label">Climatiq API</text>
  <text x="1455" y="273" class="small">factor search + estimates</text>
  <rect x="1427" y="302" width="281" height="58" rx="16" class="box"/>
  <text x="1455" y="327" class="label">Google Cloud Storage</text>
  <text x="1455" y="350" class="small">activity lookup CSV preload</text>
  <rect x="1427" y="379" width="281" height="58" rx="16" class="box"/>
  <text x="1455" y="404" class="label">Optional LLM provider</text>
  <text x="1455" y="427" class="small">structured extraction support</text>

  <path d="M420 305 C455 305 470 305 505 305" class="arrow"/>
  <path d="M865 305 C900 305 915 305 950 305" class="arrow"/>
  <path d="M1310 305 C1345 305 1360 305 1395 305" class="arrow-muted"/>

  <rect x="60" y="535" width="1680" height="360" rx="30" class="panel"/>
  <text x="92" y="579" class="section-title">Structured estimate pipeline</text>
  <text x="92" y="607" class="small">The calculation path is built around validated activity data, not free-form prose.</text>

  <rect x="92" y="650" width="184" height="88" rx="18" class="box-green"/>
  <text x="118" y="681" class="label">Preprocess</text>
  <text x="118" y="706" class="small">normalize surface</text>
  <text x="118" y="727" class="small">mess, preserve text</text>

  <rect x="320" y="650" width="184" height="88" rx="18" class="box-green"/>
  <text x="346" y="681" class="label">Extract events</text>
  <text x="346" y="706" class="small">activity spans,</text>
  <text x="346" y="727" class="small">types, entities</text>

  <rect x="548" y="650" width="184" height="88" rx="18" class="box-green"/>
  <text x="574" y="681" class="label">Normalize</text>
  <text x="574" y="706" class="small">distance, energy,</text>
  <text x="574" y="727" class="small">weight, money</text>

  <rect x="776" y="650" width="184" height="88" rx="18" class="box-green"/>
  <text x="802" y="681" class="label">Enrich</text>
  <text x="802" y="706" class="small">vehicle, fuel,</text>
  <text x="802" y="727" class="small">material, device</text>

  <rect x="1004" y="650" width="184" height="88" rx="18" class="box-green"/>
  <text x="1030" y="681" class="label">Build params</text>
  <text x="1030" y="706" class="small">category-specific</text>
  <text x="1030" y="727" class="small">calculation inputs</text>

  <rect x="1232" y="650" width="184" height="88" rx="18" class="box-green"/>
  <text x="1258" y="681" class="label">Find factor</text>
  <text x="1258" y="706" class="small">retrieve compatible</text>
  <text x="1258" y="727" class="small">candidate records</text>

  <rect x="1460" y="650" width="184" height="88" rx="18" class="box-green"/>
  <text x="1486" y="681" class="label">Validate</text>
  <text x="1486" y="706" class="small">unit type, source,</text>
  <text x="1486" y="727" class="small">factor fit</text>

  <path d="M276 694 H320" class="arrow"/>
  <path d="M504 694 H548" class="arrow"/>
  <path d="M732 694 H776" class="arrow"/>
  <path d="M960 694 H1004" class="arrow"/>
  <path d="M1188 694 H1232" class="arrow"/>
  <path d="M1416 694 H1460" class="arrow"/>

  <rect x="350" y="792" width="280" height="66" rx="18" class="box-blue"/>
  <text x="382" y="819" class="label">Climatiq estimate</text>
  <text x="382" y="842" class="small">when a compatible factor is available</text>

  <rect x="700" y="792" width="280" height="66" rx="18" class="box-amber"/>
  <text x="732" y="819" class="label">Local fallback</text>
  <text x="732" y="842" class="small">visible assumptions and lower confidence</text>

  <rect x="1050" y="792" width="280" height="66" rx="18" class="box-red"/>
  <text x="1082" y="819" class="label">Unresolved / not included</text>
  <text x="1082" y="842" class="small">shown to the user, excluded from totals</text>

  <path d="M1552 738 C1552 790 630 762 535 792" class="arrow-muted"/>
  <path d="M1552 738 C1552 806 980 762 884 792" class="arrow-muted"/>
  <path d="M1552 738 C1552 822 1260 762 1194 792" class="arrow-muted"/>

  <rect x="60" y="965" width="815" height="145" rx="28" class="panel-blue"/>
  <text x="92" y="1008" class="section-title">Response contract</text>
  <text x="92" y="1040" class="small">total, source breakdown, coverage, comparison, details</text>
  <text x="92" y="1067" class="small">per-activity status, parameters, confidence, assumptions, issues</text>
  <text x="92" y="1094" class="small">factor metadata and diagnostics stay available for the Details tab</text>

  <rect x="925" y="965" width="815" height="145" rx="28" class="panel-green"/>
  <text x="957" y="1008" class="section-title">Dashboard rendering rules</text>
  <text x="957" y="1040" class="small">only estimated and fallback-estimated activities count toward totals</text>
  <text x="957" y="1067" class="small">assumptions and confidence stay visible in the primary UI</text>
  <text x="957" y="1094" class="small">technical details are preserved without overwhelming the consumer view</text>

  <path d="M840 858 C690 922 500 922 468 965" class="arrow"/>
  <path d="M875 1038 H925" class="arrow"/>

  <line x1="60" y1="490" x2="1740" y2="490" class="divider"/>
</svg>
